name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy theme via rsync
        run: |
          rsync -rtvz --delete \
            --no-perms --no-times \
            --exclude='.DS_Store' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            megaservice/ \
            nuttyguru.com_j8g81qmwucn@93.90.201.182:/var/www/vhosts/nuttyguru.com/megaserviceshop.nuttyguru.com/themes/megaservice/

      - name: Deploy overrides via rsync
        run: |
          rsync -rtvz \
            --no-perms --no-times \
            --exclude='.DS_Store' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            override/ \
            nuttyguru.com_j8g81qmwucn@93.90.201.182:/var/www/vhosts/nuttyguru.com/megaserviceshop.nuttyguru.com/override/

      - name: Deploy custom modules via rsync
        # Pas de --delete : on n'écrase pas les modules tiers présents sur le serveur,
        # on synchronise uniquement nos modules custom du repo.
        run: |
          if [ -d "modules" ]; then
            rsync -rtvz \
              --no-perms --no-times \
              --exclude='.DS_Store' \
              -e "ssh -o StrictHostKeyChecking=yes" \
              modules/ \
              nuttyguru.com_j8g81qmwucn@93.90.201.182:/var/www/vhosts/nuttyguru.com/megaserviceshop.nuttyguru.com/modules/
          fi

      - name: Clear PrestaShop cache
        run: |
          ssh -o StrictHostKeyChecking=yes nuttyguru.com_j8g81qmwucn@93.90.201.182 \
            "find /var/www/vhosts/nuttyguru.com/megaserviceshop.nuttyguru.com/var/cache -mindepth 1 -delete || true"
